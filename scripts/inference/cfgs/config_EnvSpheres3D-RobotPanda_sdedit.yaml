# SDEdit configuration for EnvSpheres3D-RobotPanda (3D environment with 7-DOF Panda)
#
# This config enables SDEdit-style re-planning for the 3D spheres environment.
# Note: Sketch mode is not practical for high-DOF robots (7-DOF joint space).
# Use replan mode to interactively add/remove obstacles and regenerate paths.

model_dir_ddpm_bspline: '/mnt/e/danny/MPEdit/data_trained_models/launch_train_diffusion_models-v04_2024-09-18_08-12-54/generative_model_class___GaussianDiffusionModel/dataset_subdir___EnvSpheres3D-RobotPanda-joint_joint-one-RRTConnect/dataset_file_merged___dataset_merged_doubled.hdf5/context_ee_goal_pose___True/unet_input_dim___32/unet_dim_mults_option___1/context_q_out_dim___128/context_ee_goal_pose_out_dim___128/context_combined_out_dim___128/bspline_num_control_points_desired___24/parametric_trajectory_class___ParametricTrajectoryBspline/0'

model_selection: 'bspline'

# minimum distance between start and goal configurations
min_distance_q_pos_start_goal: 3.5

# environment options
env_id_replace: null
grasped_object: null

# collision avoidance/checking options
obstacle_cutoff_margin_extra: 0.05
margin_for_dense_collision_checking: 0.0

# task options
num_T_pts: 128
trajectory_duration: 10.0
phase_time_class: 'PhaseTimeLinear'
project_gradient_hierarchy: false

costs:
  CostTaskSpaceCollisionObjects:
    weight: 10.0
    use_only_on_extra_objects: false
  CostTaskSpaceCollisionSelf:
    weight: 1.0
  CostJointSpaceJointLimits:
    weight: 1.0
  CostTaskSpaceEEGoalPose:
    weight: 1.0
  CostJointSpaceVelocity:
    weight: 0.01
  CostJointSpaceAcceleration:
    weight: 0.001

n_trajectory_samples: 100
best_trajectory_selection: 'shortest_path_length'

# Planner options — use MPD (diffusion + guide) for SDEdit to leverage cost guidance
planner_alg: 'mpd'
diffusion_sampling_method: 'ddim'
compute_costs_with_xrecon: false
n_diffusion_steps_without_noise: 0
extra_mp_steps: 0

# ddim options
ddim:
  t_start_guide_steps_fraction: 0.3
  ddim_sampling_timesteps: 15
  ddim_eta: 0.3
  ddim_skip_type: 'quadratic'
  ddim_scale_grad_prior: 0.25
  n_guide_steps: 4
  guide_lr: 1.0
  max_perturb_x: 0.15
  clip_grad: true
  clip_grad_rule: 'value'
  max_grad_norm: 1.
  max_grad_value: 1.

# ddpm options (if using ddpm instead)
ddpm:
  t_start_guide_steps_fraction: 0.2
  prior_weight_with_guide: 0.95
  noise_std: 0.7
  n_guide_steps: 2
  guide_lr: 0.01
  max_perturb_x: 0.15
  clip_grad: true
  clip_grad_rule: 'value'
  max_grad_norm: 1.
  max_grad_value: 1.

# SDEdit-specific options
sdedit:
  t_noise_level: 7
  mode: 'replan'

  # Obstacle modification (for replan mode)
  obstacle_modification:
    type: 'add_sphere'
    center: [0.0, 0.0, 0.5]
    radius: 0.15

# diffusion_prior_then_guide options (needed by planner internals)
diffusion_prior_then_guide: &repl
  n_guide_steps: 12
  guide_lr: 0.01
  max_perturb_x: 0.15
  clip_grad: true
  clip_grad_rule: 'value'
  max_grad_norm: 1.
  max_grad_value: 1.

gp_prior_then_guide:
  <<: *repl

knn_prior_then_guide:
  <<: *repl

cvae_prior_then_guide:
  <<: *repl

rrtconnect_then_guide:
  <<: *repl
